<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontwikkeling Nederlands</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a2e1a 0%,#0f4a2a 40%,#1a6b3a 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:30px 20px}
        .top-bar{width:100%;max-width:1400px;display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
        .logo{color:#7fffa0;font-size:1.4rem;font-weight:700;letter-spacing:1px}
        .leerling-naam{color:white;font-size:1rem;opacity:0.85}
        .welkom-blok{width:100%;max-width:1400px;margin-bottom:30px}
        .welkom-blok h1{color:white;font-size:2.2rem;font-weight:700;margin-bottom:6px}
        .welkom-blok p{color:#a8f0c0;font-size:1.1rem}
        .kaarten-rij{width:100%;max-width:1400px;display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:30px}
        .kaart{border-radius:20px;overflow:hidden;cursor:pointer;transition:all 0.25s;position:relative;height:240px;border:1px solid rgba(255,255,255,0.15)}
        .kaart:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(0,0,0,0.4)}
        .kaart.docent-only{cursor:not-allowed;opacity:0.5}
        .kaart.docent-only:hover{transform:none;box-shadow:none}
        .foto{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
        .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,rgba(0,0,0,0.7) 100%)}
        .kaart-inhoud{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
        .ring-wrapper{position:relative;width:110px;height:110px;margin-bottom:10px}
        .ring-wrapper canvas{width:110px;height:110px}
        .ring-tekst{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
        .ring-tekst .pct{font-size:1.3rem;font-weight:700;color:white;display:block;text-shadow:0 1px 4px rgba(0,0,0,0.6)}
        .kaart-titel{color:white;font-size:0.9rem;font-weight:600;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,0.6)}
        .docent-badge{font-size:0.7rem;color:#7fffa0;margin-top:6px;text-align:center}
        .status-balk{width:100%;max-width:1400px;background:rgba(255,255,255,0.06);border-radius:16px;padding:20px 28px;display:flex;gap:30px;align-items:center;border:1px solid rgba(255,255,255,0.1);flex-wrap:wrap}
        .status-item{display:flex;align-items:center;gap:10px;color:white;font-size:0.9rem}
        .status-bol{width:14px;height:14px;border-radius:50%;flex-shrink:0}
        @media(max-width:900px){.kaarten-rij{grid-template-columns:repeat(2,1fr)}.kaart:last-child{grid-column:span 2}}
        @media(max-width:480px){.kaarten-rij{grid-template-columns:1fr}.kaart:last-child{grid-column:span 1}}
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">🌱 Yonder ISK</div>
        <div class="leerling-naam">Ingelogd als: <strong>Ahmed El Fassi</strong></div>
    </div>

    <div class="welkom-blok">
        <h1>Ontwikkeling Nederlands</h1>
        <p>Klik op een onderdeel om te oefenen.</p>
    </div>

    <div class="kaarten-rij">

        <div class="kaart" onclick="kies('lezen')">
            <img class="foto" src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=400&q=80" alt="Lezen">
            <div class="overlay"></div>
            <div class="kaart-inhoud">
                <div class="ring-wrapper">
                    <canvas id="ring-lezen" width="110" height="110"></canvas>
                    <div class="ring-tekst"><span class="pct" id="pct-lezen">0%</span></div>
                </div>
                <div class="kaart-titel">Lezen</div>
            </div>
        </div>

        <div class="kaart" onclick="kies('schrijven')">
            <img class="foto" src="https://images.unsplash.com/photo-1455390582262-044cdead277a?w=400&q=80" alt="Schrijven">
            <div class="overlay"></div>
            <div class="kaart-inhoud">
                <div class="ring-wrapper">
                    <canvas id="ring-schrijven" width="110" height="110"></canvas>
                    <div class="ring-tekst"><span class="pct" id="pct-schrijven">0%</span></div>
                </div>
                <div class="kaart-titel">Schrijven</div>
            </div>
        </div>

        <div class="kaart" onclick="kies('grammatica')">
            <img class="foto" src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=400&q=80" alt="Grammatica">
            <div class="overlay"></div>
            <div class="kaart-inhoud">
                <div class="ring-wrapper">
                    <canvas id="ring-grammatica" width="110" height="110"></canvas>
                    <div class="ring-tekst"><span class="pct" id="pct-grammatica">0%</span></div>
                </div>
                <div class="kaart-titel">Grammatica</div>
            </div>
        </div>

        <div class="kaart" onclick="kies('schoolse')">
            <img class="foto" src="https://images.unsplash.com/photo-1588072432836-e10032774350?w=400&q=80" alt="Schoolse vaardigheden">
            <div class="overlay"></div>
            <div class="kaart-inhoud">
                <div class="ring-wrapper">
                    <canvas id="ring-schoolse" width="110" height="110"></canvas>
                    <div class="ring-tekst"><span class="pct" id="pct-schoolse">0%</span></div>
                </div>
                <div class="kaart-titel">Schoolse vaardigheden</div>
            </div>
        </div>

        <div class="kaart docent-only">
            <img class="foto" src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=400&q=80" alt="Inzet en gedrag">
            <div class="overlay"></div>
            <div class="kaart-inhoud">
                <div class="ring-wrapper">
                    <canvas id="ring-gedrag" width="110" height="110"></canvas>
                    <div class="ring-tekst"><span class="pct" id="pct-gedrag">0%</span></div>
                </div>
                <div class="kaart-titel">Inzet & gedrag</div>
                <div class="docent-badge">Alleen docent</div>
            </div>
        </div>

    </div>

    <div class="status-balk">
        <div class="status-item"><div class="status-bol" style="background:#ef4444"></div> Herhalen (onder 70%)</div>
        <div class="status-item"><div class="status-bol" style="background:#f59e0b"></div> In ontwikkeling (70–79%)</div>
        <div class="status-item"><div class="status-bol" style="background:#22c55e"></div> Beheerst (80% of meer)</div>
    </div>

    <script>
        var data = [
            {id:'lezen',     pct:70},
            {id:'schrijven', pct:45},
            {id:'grammatica',pct:85},
            {id:'schoolse',  pct:60},
            {id:'gedrag',    pct:75}
        ];

        function kleur(p){
            if(p>=80) return '#22c55e';
            if(p>=70) return '#f59e0b';
            return '#ef4444';
        }

        function teken(id, pct){
            var c = document.getElementById('ring-'+id);
            if(!c) return;
            var x = c.getContext('2d');
            var r=44, d=10, cx=55, cy=55;
            x.clearRect(0,0,110,110);
            x.beginPath();
            x.arc(cx,cy,r,0,2*Math.PI);
            x.strokeStyle='rgba(255,255,255,0.25)';
            x.lineWidth=d;
            x.stroke();
            if(pct>0){
                x.beginPath();
                x.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(2*Math.PI*pct/100));
                x.strokeStyle=kleur(pct);
                x.lineWidth=d;
                x.lineCap='round';
                x.stroke();
            }
            var el = document.getElementById('pct-'+id);
            if(el) el.textContent = pct+'%';
        }

        function kies(d){
            alert('Je hebt gekozen: '+d+'\nDe oefeningen komen hier binnenkort!');
        }

        window.addEventListener('load', function(){
            data.forEach(function(d){ teken(d.id, d.pct); });
        });
    </script>

</body>
</html>
