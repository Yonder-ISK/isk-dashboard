<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISK Leerpad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .dashboard {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .header p {
            color: #718096;
            font-size: 1rem;
        }

        .ring-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            position: relative;
        }

        canvas {
            max-width: 200px;
        }

        .percentage-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .percentage-text span {
            font-size: 2rem;
            font-weight: bold;
            color: #2d3748;
        }

        .percentage-text p {
            font-size: 0.8rem;
            color: #718096;
        }

        .domein-titel {
            text-align: center;
            color: #718096;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .keuze-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .keuze-knop {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            color: #2d3748;
        }

        .keuze-knop:hover {
            border-color: #4299e1;
            background: #ebf8ff;
            transform: translateY(-2px);
        }

        .keuze-knop .icoon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .keuze-knop.docent-only {
            border-color: #e2e8f0;
            color: #a0aec0;
            cursor: not-allowed;
            background: #f7fafc;
        }

        .keuze-knop.docent-only:hover {
            transform: none;
            border-color: #e2e8f0;
            background: #f7fafc;
        }

        .docent-label {
            font-size: 0.7rem;
            color: #a0aec0;
            margin-top: 4px;
        }

        .welkom {
            text-align: center;
            margin-bottom: 10px;
            color: #4a5568;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>📚 ISK Leerpad</h1>
            <p class="welkom">Welkom, <strong>Ahmed</strong></p>
        </div>

        <div class="ring-container">
            <canvas id="ringDiagram" width="200" height="200"></canvas>
            <div class="percentage-text">
                <span id="percentageTekst">70%</span>
                <p>behaald</p>
            </div>
        </div>

        <p class="domein-titel">Kies een onderdeel om aan te werken:</p>

        <div class="keuze-grid">
            <div class="keuze-knop" onclick="kiesdomein('lezen')">
                <div class="icoon">📖</div>
                Lezen
            </div>
            <div class="keuze-knop" onclick="kiesdomein('schrijven')">
                <div class="icoon">✏️</div>
                Schrijven
            </div>
            <div class="keuze-knop" onclick="kiesdomein('grammatica')">
                <div class="icoon">🔤</div>
                Grammatica
            </div>
            <div class="keuze-knop" onclick="kiesdomein('schoolse-vaardigheden')">
                <div class="icoon">🎒</div>
                Schoolse vaardigheden
            </div>
            <div class="keuze-knop docent-only">
                <div class="icoon">⭐</div>
                Inzet & gedrag
                <div class="docent-label">Alleen docent</div>
            </div>
        </div>
    </div>

    <script>
        const percentage = 70;

        function getKleur(pct) {
            if (pct >= 80) return '#48bb78';
            if (pct >= 70) return '#ecc94b';
            if (pct >= 50) return '#ed8936';
            return '#fc8181';
        }

        function tekenRing(pct) {
            const canvas = document.getElementById('ringDiagram');
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const straal = 80;
            const dikte = 20;
            const kleur = getKleur(pct);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Grijze achtergrondring
            ctx.beginPath();
            ctx.arc(cx, cy, straal, 0, 2 * Math.PI);
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = dikte;
            ctx.stroke();

            // Gekleurde voortgangsring
            const startHoek = -Math.PI / 2;
            const eindHoek = startHoek + (2 * Math.PI * pct / 100);
            ctx.beginPath();
            ctx.arc(cx, cy, straal, startHoek, eindHoek);
            ctx.strokeStyle = kleur;
            ctx.lineWidth = dikte;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function kiesdomein(domein) {
            alert('Je hebt gekozen: ' + domein + '\nDe oefeningen komen hier binnenkort!');
        }

        tekenRing(percentage);
    </script>
</body>
</html>
